<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 240 240" width="240" height="240"
  xml:space="preserve">
  <!--
    BIMI logo for Zari AI — zaricoach.com
    Spec: square, all self-contained, no external refs, no scripts.
    DNS record to add:
      default._bimi.zaricoach.com.  TXT  "v=BIMI1; l=https://app.zaricoach.com/assets/bimi-logo.svg; a=;"
    Prerequisite: DMARC p=quarantine or p=reject must be in place.
      _dmarc.zaricoach.com.  TXT  "v=DMARC1; p=quarantine; rua=mailto:dmarc@zaricoach.com;"
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="240" height="240" rx="54" ry="54" fill="url(#bg)"/>
  <!-- Wordmark: Z -->
  <text
    x="120" y="165"
    font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
    font-size="148"
    font-weight="900"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-6">Z</text>
</svg>
