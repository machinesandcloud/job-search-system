[build]
  command = "export DATABASE_URL=${NETLIFY_DATABASE_URL:-$DATABASE_URL} && export DIRECT_URL=${NETLIFY_DATABASE_URL_UNPOOLED:-$DIRECT_URL} && npm run prisma:generate && npm run prisma:migrate && npm run prisma:seed && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
