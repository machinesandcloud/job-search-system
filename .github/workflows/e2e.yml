name: E2E (Production)

# Runs automatically after CI passes on main (i.e. after every Netlify deploy).
# Also available via manual trigger from the GitHub Actions tab.
on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test against (default: https://zaricoach.com)"
        required: false
        default: "https://zaricoach.com"

jobs:
  e2e:
    name: Playwright · Production smoke tests
    # On workflow_run: only proceed if CI actually passed.
    # On manual dispatch: always run.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          # workflow_run uses the secret; manual dispatch uses the input or falls back to secret.
          E2E_BASE_URL: ${{ inputs.base_url || secrets.E2E_BASE_URL || 'https://zaricoach.com' }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
